# MediaFlix Site Configuration
# Edit this file to configure your media center landing page.
# Restart the API server after making changes.

# Background style for the main page
# style options: posters | gradient
background:
  style: "posters"

branding:
  # The brand name displayed as the main logo (gradient part + plain part)
  name: "mediaflix"
  # Subtitle shown below the logo
  tagline: "Your personal streaming universe — all your media services, stats, and downloads in one beautiful dashboard."
  # Accent color for the gradient logo (not currently used, kept for future theming)
  accent_color: "#a855f7"

# Internal service URLs — used by the server for API proxying and health checks.
# Use the LAN IP:port of each service. Leave as "" to disable.
services:
  plex: ""                         # e.g. http://192.168.1.10:32400
  overseerr: "http://192.168.52.36:5055"
  tautulli: "http://192.168.52.36:8181"
  radarr: ""                       # e.g. http://192.168.1.10:7878
  sonarr: ""                       # e.g. http://192.168.1.10:8989
  sabnzbd: "http://192.168.52.36:8282"
  qbittorrent: ""                  # e.g. http://192.168.1.10:8090

# Public-facing links shown on the quick-access service cards.
# Use reverse-proxy paths (e.g. /sonarr) or full URLs for external services.
# Falls back to the internal services URL above if left empty.
links:
  plex: ""
  overseerr: "https://requests.noahflix.net"
  tautulli: "/tautulli"
  radarr: "/radarr"
  sonarr: "/sonarr"
  sabnzbd: "/sabnzbd"
  qbittorrent: "/qui"

# Tautulli integration — used to show live "Now Watching" data.
# The API key is kept server-side and never exposed to the browser.
tautulli:
  api_key: "b078e1ca4eb94c51aa55da6a25e2aad4"

# Overseerr/Jellyseerr integration — used to show recent media requests.
# The API key is kept server-side and never exposed to the browser.
overseerr:
  api_key: "MTc3MjMwNDMyMTUwMDFlNTQ0ZjAxLWZkMzAtNDRlZC04ZWJkLTM2ZmEyZDE4NTI1OA=="

# SABnzbd integration — used to show live download queue data.
# The API key is kept server-side and never exposed to the browser.
sabnzbd:
  api_key: "8e60cf87f4644ebaa8b1d6099b25e789"

# TMDB integration — used to fetch movie posters for the background.
# Free API key from https://www.themoviedb.org/settings/api
# source options: now_playing | popular | top_rated | upcoming
tmdb:
  api_key: "592970f68da763d1197d787ff23b2950"
  source: "now_playing"

# Access buttons shown in the hero section
access:
  # "Request Media" button — typically points to Overseerr
  request_url: "https://requests.noahflix.net"
  request_label: "Request Media"
  # "Request Access" button — link for new users to request login credentials
  access_url: ""
  access_label: "Request Access"
