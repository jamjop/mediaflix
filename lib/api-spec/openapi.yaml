openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: config
    description: Site configuration
  - name: activity
    description: Live streaming activity
  - name: downloads
    description: Live download queue
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get site configuration
      description: Returns site branding, service URLs, and access settings read from settings.yaml
      responses:
        "200":
          description: Site configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteConfig"
  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get live streaming activity
      description: Proxies Tautulli activity data server-side. Returns empty sessions if Tautulli is not configured.
      responses:
        "200":
          description: Current streaming sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityData"
  /downloads:
    get:
      operationId: getDownloads
      tags: [downloads]
      summary: Get live SABnzbd download queue
      description: Proxies SABnzbd queue data server-side. Returns empty queue if SABnzbd is not configured.
      responses:
        "200":
          description: Current download queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadsData"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SiteServices:
      type: object
      properties:
        plex:
          type: string
        overseerr:
          type: string
        tautulli:
          type: string
        radarr:
          type: string
        sonarr:
          type: string
        sabnzbd:
          type: string
        qbittorrent:
          type: string
      required:
        - plex
        - overseerr
        - tautulli
        - radarr
        - sonarr
        - sabnzbd
        - qbittorrent
    SiteBranding:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        accent_color:
          type: string
      required:
        - name
        - tagline
        - accent_color
    SiteAccess:
      type: object
      properties:
        request_url:
          type: string
        request_label:
          type: string
        access_url:
          type: string
        access_label:
          type: string
      required:
        - request_url
        - request_label
        - access_url
        - access_label
    SiteConfig:
      type: object
      properties:
        branding:
          $ref: "#/components/schemas/SiteBranding"
        services:
          $ref: "#/components/schemas/SiteServices"
        access:
          $ref: "#/components/schemas/SiteAccess"
      required:
        - branding
        - services
        - access
    StreamSession:
      type: object
      properties:
        user:
          type: string
        title:
          type: string
        parent_title:
          type: string
        grandparent_title:
          type: string
        media_type:
          type: string
        progress_percent:
          type: string
        state:
          type: string
        player:
          type: string
        duration:
          type: integer
        view_offset:
          type: integer
      required:
        - user
        - title
        - parent_title
        - grandparent_title
        - media_type
        - progress_percent
        - state
        - player
        - duration
        - view_offset
    ActivityData:
      type: object
      properties:
        stream_count:
          type: integer
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/StreamSession"
        configured:
          type: boolean
      required:
        - stream_count
        - sessions
        - configured
    DownloadSlot:
      type: object
      properties:
        filename:
          type: string
        percentage:
          type: string
        size:
          type: string
        sizeleft:
          type: string
        status:
          type: string
        timeleft:
          type: string
        cat:
          type: string
      required:
        - filename
        - percentage
        - size
        - sizeleft
        - status
        - timeleft
        - cat
    DownloadsData:
      type: object
      properties:
        speed:
          type: string
        kbpersec:
          type: string
        mb:
          type: string
        mbleft:
          type: string
        diskspace1:
          type: string
        noofslots:
          type: integer
        slots:
          type: array
          items:
            $ref: "#/components/schemas/DownloadSlot"
        configured:
          type: boolean
      required:
        - speed
        - kbpersec
        - mb
        - mbleft
        - diskspace1
        - noofslots
        - slots
        - configured
