openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: config
    description: Site configuration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get site configuration
      description: Returns site branding, service URLs, and access settings read from settings.yaml
      responses:
        "200":
          description: Site configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteConfig"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SiteServices:
      type: object
      properties:
        plex:
          type: string
        overseerr:
          type: string
        tautulli:
          type: string
        radarr:
          type: string
        sonarr:
          type: string
        sabnzbd:
          type: string
        qbittorrent:
          type: string
      required:
        - plex
        - overseerr
        - tautulli
        - radarr
        - sonarr
        - sabnzbd
        - qbittorrent
    SiteBranding:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        accent_color:
          type: string
      required:
        - name
        - tagline
        - accent_color
    SiteAccess:
      type: object
      properties:
        request_url:
          type: string
        request_label:
          type: string
        access_url:
          type: string
        access_label:
          type: string
      required:
        - request_url
        - request_label
        - access_url
        - access_label
    SiteConfig:
      type: object
      properties:
        branding:
          $ref: "#/components/schemas/SiteBranding"
        services:
          $ref: "#/components/schemas/SiteServices"
        access:
          $ref: "#/components/schemas/SiteAccess"
      required:
        - branding
        - services
        - access
