openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: config
    description: Site configuration
  - name: activity
    description: Live streaming activity
  - name: recently-added
    description: Recently added media
  - name: requests
    description: Overseerr media requests
  - name: downloads
    description: Live download queue
  - name: services
    description: Service health status
  - name: access
    description: Access request form
  - name: auth
    description: Authentication for protected pages
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get site configuration
      description: Returns site branding, service URLs, and access settings read from settings.yaml
      responses:
        "200":
          description: Site configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteConfig"
  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get live streaming activity
      description: Proxies Tautulli activity data server-side. Returns empty sessions if Tautulli is not configured.
      responses:
        "200":
          description: Current streaming sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityData"
  /posters:
    get:
      operationId: getPosters
      tags: [config]
      summary: Get now-playing movie poster URLs
      description: Fetches current now-playing movies from TMDB and returns poster image URLs for the background mosaic.
      responses:
        "200":
          description: List of poster URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostersData"
  /service-status:
    get:
      operationId: getServiceStatus
      tags: [services]
      summary: Ping all configured services
      description: Attempts a HEAD request to each configured service URL and returns reachability status.
      responses:
        "200":
          description: Service health map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckData"
  /requests:
    get:
      operationId: getRequests
      tags: [requests]
      summary: Get recent Overseerr media requests
      description: Proxies Overseerr request data server-side. Returns recent requests with title, poster, and status.
      responses:
        "200":
          description: Recent media requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestsData"
  /downloads:
    get:
      operationId: getDownloads
      tags: [downloads]
      summary: Get live download queue
      description: Aggregates active downloads from SABnzbd and qBittorrent. Returns empty queue if neither is configured.
      responses:
        "200":
          description: Current download queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadsData"
  /recently-added:
    get:
      operationId: getRecentlyAdded
      tags: [recently-added]
      summary: Get recently added media
      description: Returns recently added movies and episodes from Tautulli with thumbnails.
      responses:
        "200":
          description: Recently added items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentlyAddedData"
  /auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Check authentication status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Log in with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /metrics:
    get:
      operationId: getServerMetrics
      tags: [metrics]
      summary: Get server system metrics
      description: Returns live CPU, memory, disk, network, and uptime metrics for the host machine.
      responses:
        "200":
          description: Server metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerMetrics"
  /access-request:
    post:
      operationId: submitAccessRequest
      tags: [access]
      summary: Submit a server access request
      description: Validates CAPTCHA, rate-limits, checks honeypot, and sends an email to the admin with the requester's Plex username.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRequestBody"
      responses:
        "200":
          description: Request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestResponse"
        "400":
          description: Validation or CAPTCHA error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestResponse"
  /diskspace:
    get:
      operationId: getDiskSpace
      tags: [services]
      summary: Get media library disk usage
      description: Fetches disk space from Radarr and Sonarr. Returns configured=false if neither service has an API key set.
      responses:
        "200":
          description: Disk space data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskSpaceData"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SiteServices:
      type: object
      properties:
        plex:
          type: string
        overseerr:
          type: string
        tautulli:
          type: string
        radarr:
          type: string
        sonarr:
          type: string
        sabnzbd:
          type: string
        qbittorrent:
          type: string
      required:
        - plex
        - overseerr
        - tautulli
        - radarr
        - sonarr
        - sabnzbd
        - qbittorrent
    SiteLinks:
      type: object
      properties:
        plex:
          type: string
        overseerr:
          type: string
        tautulli:
          type: string
        radarr:
          type: string
        sonarr:
          type: string
        sabnzbd:
          type: string
        qbittorrent:
          type: string
        grafana:
          type: string
      required:
        - plex
        - overseerr
        - tautulli
        - radarr
        - sonarr
        - sabnzbd
        - qbittorrent
        - grafana
    SiteBackground:
      type: object
      properties:
        style:
          type: string
      required:
        - style
    SiteBranding:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        accent_color:
          type: string
      required:
        - name
        - tagline
        - accent_color
    SiteAccess:
      type: object
      properties:
        request_url:
          type: string
        request_label:
          type: string
        access_url:
          type: string
        access_label:
          type: string
      required:
        - request_url
        - request_label
        - access_url
        - access_label
    SiteConfig:
      type: object
      properties:
        background:
          $ref: "#/components/schemas/SiteBackground"
        branding:
          $ref: "#/components/schemas/SiteBranding"
        services:
          $ref: "#/components/schemas/SiteServices"
        links:
          $ref: "#/components/schemas/SiteLinks"
        access:
          $ref: "#/components/schemas/SiteAccess"
        captcha_site_key:
          type: string
      required:
        - background
        - branding
        - services
        - links
        - access
    StreamSession:
      type: object
      properties:
        user:
          type: string
        title:
          type: string
        parent_title:
          type: string
        grandparent_title:
          type: string
        media_type:
          type: string
        progress_percent:
          type: string
        state:
          type: string
        player:
          type: string
        duration:
          type: integer
        view_offset:
          type: integer
      required:
        - user
        - title
        - parent_title
        - grandparent_title
        - media_type
        - progress_percent
        - state
        - player
        - duration
        - view_offset
    ActivityData:
      type: object
      properties:
        stream_count:
          type: integer
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/StreamSession"
        configured:
          type: boolean
      required:
        - stream_count
        - sessions
        - configured
    PostersData:
      type: object
      properties:
        posters:
          type: array
          items:
            type: string
        source:
          type: string
      required:
        - posters
        - source
    ServiceStatus:
      type: object
      properties:
        ok:
          type: boolean
        latency_ms:
          type: integer
        configured:
          type: boolean
      required:
        - ok
        - latency_ms
        - configured
    HealthCheckData:
      type: object
      properties:
        plex:
          $ref: "#/components/schemas/ServiceStatus"
        overseerr:
          $ref: "#/components/schemas/ServiceStatus"
        tautulli:
          $ref: "#/components/schemas/ServiceStatus"
        radarr:
          $ref: "#/components/schemas/ServiceStatus"
        sonarr:
          $ref: "#/components/schemas/ServiceStatus"
        sabnzbd:
          $ref: "#/components/schemas/ServiceStatus"
        qbittorrent:
          $ref: "#/components/schemas/ServiceStatus"
      required:
        - plex
        - overseerr
        - tautulli
        - radarr
        - sonarr
        - sabnzbd
        - qbittorrent
    MediaRequest:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        poster_path:
          type: string
        media_type:
          type: string
        request_status:
          type: integer
        media_status:
          type: integer
        requested_by:
          type: string
      required:
        - id
        - title
        - poster_path
        - media_type
        - request_status
        - media_status
        - requested_by
    RequestsData:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/MediaRequest"
        configured:
          type: boolean
      required:
        - requests
        - configured
    DownloadSlot:
      type: object
      properties:
        filename:
          type: string
        percentage:
          type: string
        size:
          type: string
        sizeleft:
          type: string
        status:
          type: string
        timeleft:
          type: string
        cat:
          type: string
        source:
          type: string
      required:
        - filename
        - percentage
        - size
        - sizeleft
        - status
        - timeleft
        - cat
        - source
    DownloadsData:
      type: object
      properties:
        speed:
          type: string
        kbpersec:
          type: string
        mb:
          type: string
        mbleft:
          type: string
        diskspace1:
          type: string
        noofslots:
          type: integer
        slots:
          type: array
          items:
            $ref: "#/components/schemas/DownloadSlot"
        configured:
          type: boolean
        qbt_configured:
          type: boolean
        history:
          type: array
          items:
            $ref: "#/components/schemas/DownloadHistorySlot"
      required:
        - speed
        - kbpersec
        - mb
        - mbleft
        - diskspace1
        - noofslots
        - slots
        - configured
        - qbt_configured
        - history
    DownloadHistorySlot:
      type: object
      properties:
        filename:
          type: string
        size:
          type: string
        source:
          type: string
        completed_at:
          type: integer
          nullable: true
      required:
        - filename
        - size
        - source
    RecentlyAddedItem:
      type: object
      properties:
        title:
          type: string
        grandparent_title:
          type: string
        parent_title:
          type: string
        media_type:
          type: string
        thumb_url:
          type: string
          nullable: true
        added_at:
          type: integer
        year:
          type: integer
          nullable: true
      required:
        - title
        - grandparent_title
        - parent_title
        - media_type
        - added_at
    RecentlyAddedData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecentlyAddedItem"
        configured:
          type: boolean
      required:
        - items
        - configured
    CpuMetrics:
      type: object
      properties:
        usage_percent:
          type: number
        temp_celsius:
          type: number
          nullable: true
        cores:
          type: integer
        brand:
          type: string
        load_1m:
          type: number
        load_5m:
          type: number
        load_15m:
          type: number
      required:
        - usage_percent
        - cores
        - brand
        - load_1m
        - load_5m
        - load_15m
    MemoryMetrics:
      type: object
      properties:
        total_bytes:
          type: integer
        used_bytes:
          type: integer
        free_bytes:
          type: integer
        usage_percent:
          type: number
      required:
        - total_bytes
        - used_bytes
        - free_bytes
        - usage_percent
    DiskMetric:
      type: object
      properties:
        fs:
          type: string
        mount:
          type: string
        size_bytes:
          type: integer
        used_bytes:
          type: integer
        use_percent:
          type: number
      required:
        - fs
        - mount
        - size_bytes
        - used_bytes
        - use_percent
    NetworkMetrics:
      type: object
      properties:
        rx_bytes_per_sec:
          type: number
        tx_bytes_per_sec:
          type: number
        iface:
          type: string
      required:
        - rx_bytes_per_sec
        - tx_bytes_per_sec
        - iface
    GpuMetric:
      type: object
      properties:
        vendor:
          type: string
        model:
          type: string
        vram_mb:
          type: number
          nullable: true
        temp_celsius:
          type: number
          nullable: true
        usage_percent:
          type: number
          nullable: true
        memory_used_mb:
          type: number
          nullable: true
        memory_total_mb:
          type: number
          nullable: true
        memory_usage_percent:
          type: number
          nullable: true
      required:
        - vendor
        - model
    ServerMetrics:
      type: object
      properties:
        cpu:
          $ref: "#/components/schemas/CpuMetrics"
        memory:
          $ref: "#/components/schemas/MemoryMetrics"
        disks:
          type: array
          items:
            $ref: "#/components/schemas/DiskMetric"
        network:
          $ref: "#/components/schemas/NetworkMetrics"
        uptime_seconds:
          type: integer
        hostname:
          type: string
        gpus:
          type: array
          items:
            $ref: "#/components/schemas/GpuMetric"
      required:
        - cpu
        - memory
        - disks
        - network
        - uptime_seconds
        - hostname
        - gpus
    AuthStatus:
      type: object
      properties:
        authenticated:
          type: boolean
      required:
        - authenticated
    AuthCredentials:
      type: object
      properties:
        password:
          type: string
      required:
        - password
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
    AccessRequestBody:
      type: object
      properties:
        name:
          type: string
        plex_username:
          type: string
        email:
          type: string
        message:
          type: string
        turnstile_token:
          type: string
        _hp:
          type: string
        _ts:
          type: number
      required:
        - name
        - plex_username
        - email
        - turnstile_token
        - _ts
    AccessRequestResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
    DiskDrive:
      type: object
      properties:
        label:
          type: string
        path:
          type: string
        freeGb:
          type: number
        totalGb:
          type: number
        usedPercent:
          type: number
        source:
          type: string
      required:
        - label
        - path
        - freeGb
        - totalGb
        - usedPercent
        - source
    DiskSpaceData:
      type: object
      properties:
        drives:
          type: array
          items:
            $ref: "#/components/schemas/DiskDrive"
        configured:
          type: boolean
      required:
        - drives
        - configured
