openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: config
    description: Site configuration
  - name: activity
    description: Live streaming activity
  - name: requests
    description: Overseerr media requests
  - name: downloads
    description: Live download queue
  - name: services
    description: Service health status
  - name: access
    description: Access request form
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get site configuration
      description: Returns site branding, service URLs, and access settings read from settings.yaml
      responses:
        "200":
          description: Site configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteConfig"
  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get live streaming activity
      description: Proxies Tautulli activity data server-side. Returns empty sessions if Tautulli is not configured.
      responses:
        "200":
          description: Current streaming sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityData"
  /posters:
    get:
      operationId: getPosters
      tags: [config]
      summary: Get now-playing movie poster URLs
      description: Fetches current now-playing movies from TMDB and returns poster image URLs for the background mosaic.
      responses:
        "200":
          description: List of poster URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostersData"
  /service-status:
    get:
      operationId: getServiceStatus
      tags: [services]
      summary: Ping all configured services
      description: Attempts a HEAD request to each configured service URL and returns reachability status.
      responses:
        "200":
          description: Service health map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckData"
  /requests:
    get:
      operationId: getRequests
      tags: [requests]
      summary: Get recent Overseerr media requests
      description: Proxies Overseerr request data server-side. Returns recent requests with title, poster, and status.
      responses:
        "200":
          description: Recent media requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestsData"
  /downloads:
    get:
      operationId: getDownloads
      tags: [downloads]
      summary: Get live SABnzbd download queue
      description: Proxies SABnzbd queue data server-side. Returns empty queue if SABnzbd is not configured.
      responses:
        "200":
          description: Current download queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadsData"
  /access-request:
    post:
      operationId: submitAccessRequest
      tags: [access]
      summary: Submit a server access request
      description: Validates CAPTCHA, rate-limits, checks honeypot, and sends an email to the admin with the requester's Plex username.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRequestBody"
      responses:
        "200":
          description: Request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestResponse"
        "400":
          description: Validation or CAPTCHA error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SiteServices:
      type: object
      properties:
        plex:
          type: string
        overseerr:
          type: string
        tautulli:
          type: string
        radarr:
          type: string
        sonarr:
          type: string
        sabnzbd:
          type: string
        qbittorrent:
          type: string
      required:
        - plex
        - overseerr
        - tautulli
        - radarr
        - sonarr
        - sabnzbd
        - qbittorrent
    SiteLinks:
      type: object
      properties:
        plex:
          type: string
        overseerr:
          type: string
        tautulli:
          type: string
        radarr:
          type: string
        sonarr:
          type: string
        sabnzbd:
          type: string
        qbittorrent:
          type: string
      required:
        - plex
        - overseerr
        - tautulli
        - radarr
        - sonarr
        - sabnzbd
        - qbittorrent
    SiteBackground:
      type: object
      properties:
        style:
          type: string
      required:
        - style
    SiteBranding:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        accent_color:
          type: string
      required:
        - name
        - tagline
        - accent_color
    SiteAccess:
      type: object
      properties:
        request_url:
          type: string
        request_label:
          type: string
        access_url:
          type: string
        access_label:
          type: string
      required:
        - request_url
        - request_label
        - access_url
        - access_label
    SiteConfig:
      type: object
      properties:
        background:
          $ref: "#/components/schemas/SiteBackground"
        branding:
          $ref: "#/components/schemas/SiteBranding"
        services:
          $ref: "#/components/schemas/SiteServices"
        links:
          $ref: "#/components/schemas/SiteLinks"
        access:
          $ref: "#/components/schemas/SiteAccess"
        captcha_site_key:
          type: string
      required:
        - background
        - branding
        - services
        - links
        - access
    StreamSession:
      type: object
      properties:
        user:
          type: string
        title:
          type: string
        parent_title:
          type: string
        grandparent_title:
          type: string
        media_type:
          type: string
        progress_percent:
          type: string
        state:
          type: string
        player:
          type: string
        duration:
          type: integer
        view_offset:
          type: integer
      required:
        - user
        - title
        - parent_title
        - grandparent_title
        - media_type
        - progress_percent
        - state
        - player
        - duration
        - view_offset
    ActivityData:
      type: object
      properties:
        stream_count:
          type: integer
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/StreamSession"
        configured:
          type: boolean
      required:
        - stream_count
        - sessions
        - configured
    PostersData:
      type: object
      properties:
        posters:
          type: array
          items:
            type: string
        source:
          type: string
      required:
        - posters
        - source
    ServiceStatus:
      type: object
      properties:
        ok:
          type: boolean
        latency_ms:
          type: integer
        configured:
          type: boolean
      required:
        - ok
        - latency_ms
        - configured
    HealthCheckData:
      type: object
      properties:
        plex:
          $ref: "#/components/schemas/ServiceStatus"
        overseerr:
          $ref: "#/components/schemas/ServiceStatus"
        tautulli:
          $ref: "#/components/schemas/ServiceStatus"
        radarr:
          $ref: "#/components/schemas/ServiceStatus"
        sonarr:
          $ref: "#/components/schemas/ServiceStatus"
        sabnzbd:
          $ref: "#/components/schemas/ServiceStatus"
        qbittorrent:
          $ref: "#/components/schemas/ServiceStatus"
      required:
        - plex
        - overseerr
        - tautulli
        - radarr
        - sonarr
        - sabnzbd
        - qbittorrent
    MediaRequest:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        poster_path:
          type: string
        media_type:
          type: string
        request_status:
          type: integer
        media_status:
          type: integer
        requested_by:
          type: string
      required:
        - id
        - title
        - poster_path
        - media_type
        - request_status
        - media_status
        - requested_by
    RequestsData:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/MediaRequest"
        configured:
          type: boolean
      required:
        - requests
        - configured
    DownloadSlot:
      type: object
      properties:
        filename:
          type: string
        percentage:
          type: string
        size:
          type: string
        sizeleft:
          type: string
        status:
          type: string
        timeleft:
          type: string
        cat:
          type: string
      required:
        - filename
        - percentage
        - size
        - sizeleft
        - status
        - timeleft
        - cat
    DownloadsData:
      type: object
      properties:
        speed:
          type: string
        kbpersec:
          type: string
        mb:
          type: string
        mbleft:
          type: string
        diskspace1:
          type: string
        noofslots:
          type: integer
        slots:
          type: array
          items:
            $ref: "#/components/schemas/DownloadSlot"
        configured:
          type: boolean
      required:
        - speed
        - kbpersec
        - mb
        - mbleft
        - diskspace1
        - noofslots
        - slots
        - configured
    AccessRequestBody:
      type: object
      properties:
        name:
          type: string
        plex_username:
          type: string
        email:
          type: string
        message:
          type: string
        turnstile_token:
          type: string
        _hp:
          type: string
        _ts:
          type: number
      required:
        - name
        - plex_username
        - email
        - turnstile_token
        - _ts
    AccessRequestResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
