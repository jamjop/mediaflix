# Required for Sonarr WebSocket support — must live in the http{} block.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name noahflix.net www.noahflix.net;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name noahflix.net www.noahflix.net;

    # --- Cloudflare Origin Certificate ---
    ssl_certificate         /etc/ssl/cloudflare/cloudflare.pem;
    ssl_certificate_key     /etc/ssl/cloudflare/cloudflare.key;
    ssl_client_certificate  /etc/ssl/cloudflare/cloudflare-ca.crt;
    ssl_verify_client       on;

    # --- Let's Encrypt (commented out, uncomment to switch) ---
    # ssl_certificate     /etc/letsencrypt/live/noahflix.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/noahflix.net/privkey.pem;
    # ssl_trusted_certificate /etc/letsencrypt/live/noahflix.net/chain.pem;
    # ssl_stapling on;
    # ssl_stapling_verify on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Cloudflare real IP passthrough ---
    # Only needed when traffic is proxied through Cloudflare (i.e. using Cloudflare origin certs).
    # If you switch to direct connections / Let's Encrypt, remove or disable this block.
    # These are commented out because they are already defined in
    # /etc/nginx/conf.d/cloudflare_realip.conf which applies globally.
    # If you remove that file, uncomment the block below.
    #
    # set_real_ip_from 103.21.244.0/22;
    # set_real_ip_from 103.22.200.0/22;
    # set_real_ip_from 103.31.4.0/22;
    # set_real_ip_from 104.16.0.0/13;
    # set_real_ip_from 104.24.0.0/14;
    # set_real_ip_from 108.162.192.0/18;
    # set_real_ip_from 131.0.72.0/22;
    # set_real_ip_from 141.101.64.0/18;
    # set_real_ip_from 162.158.0.0/15;
    # set_real_ip_from 172.64.0.0/13;
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 188.114.96.0/20;
    # set_real_ip_from 190.93.240.0/20;
    # set_real_ip_from 197.234.240.0/22;
    # set_real_ip_from 198.41.128.0/17;
    # set_real_ip_from 2400:cb00::/32;
    # set_real_ip_from 2606:4700::/32;
    # set_real_ip_from 2803:f800::/32;
    # set_real_ip_from 2405:b500::/32;
    # set_real_ip_from 2405:8100::/32;
    # set_real_ip_from 2a06:98c0::/29;
    # set_real_ip_from 2c0f:f248::/32;
    # real_ip_header CF-Connecting-IP;

    server_tokens off;
    proxy_hide_header Server;

    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com; img-src 'self' data: https:; media-src 'self' https:;" always;

    root /var/www/noahflix.net;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ── MediaFlix API ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8057;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Tautulli (:8181) ──────────────────────────────────────
    location ^~ /tautulli/ {
        proxy_pass              http://127.0.0.1:8181;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Forwarded-Host    $server_name;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_read_timeout      90;

        # Tautulli requires X-Forwarded-Ssl for internal HTTPS detection
        set $xforwardedssl "off";
        if ($scheme = https) {
            set $xforwardedssl "on";
        }
        proxy_set_header        X-Forwarded-Ssl     $xforwardedssl;
        proxy_redirect ~^(http(?:s)?://)([^:/]+)(?::\d+)?(/.*)?$ $1$2:$server_port$3;
    }

    # ── Radarr (:7878) ────────────────────────────────────────
    location ^~ /radarr/ {
        proxy_pass              http://127.0.0.1:7878;
        proxy_http_version      1.1;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        # WebSocket support (required for Radarr UI)
        proxy_set_header        Upgrade             $http_upgrade;
        proxy_set_header        Connection          "Upgrade";
    }

    # ── Sonarr (:8989) ────────────────────────────────────────
    location ^~ /sonarr/ {
        proxy_pass              http://127.0.0.1:8989;
        proxy_http_version      1.1;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Host    $host;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_redirect          off;
        proxy_set_header        Upgrade             $http_upgrade;
        proxy_set_header        Connection          $connection_upgrade;
    }

    # ── SABnzbd (:8282) ───────────────────────────────────────
    # Force trailing slash so the browser resolves CSS paths correctly
    location = /sabnzbd {
        return 301 /sabnzbd/;
    }

    location ^~ /sabnzbd/ {
        proxy_pass              http://127.0.0.1:8282;
        proxy_http_version      1.1;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
    }

    # ── qBittorrent (:8082) ───────────────────────────────────
    location ^~ /qbittorrent/ {
        proxy_pass              http://127.0.0.1:8082;
        proxy_http_version      1.1;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
    }

    # ── Qui (:7476) ───────────────────────────────────────────
    location = /qui {
        return 301 /qui/;
    }

    location ^~ /qui/ {
        proxy_pass              http://127.0.0.1:7476/qui/;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
    }

    # ── Static assets (long cache) ────────────────────────────
    # add_header does not inherit into location blocks — security headers repeated here.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control                "public, immutable";
        add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options              "SAMEORIGIN"                                   always;
        add_header X-Content-Type-Options       "nosniff"                                      always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()"     always;
        add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self'; font-src 'self' data:; media-src 'self' blob:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        access_log off;
        try_files $uri =404;
    }

    # ── Static files fallback ─────────────────────────────────
    # add_header does not inherit into location blocks — security headers repeated here.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN"                                   always;
        add_header X-Content-Type-Options     "nosniff"                                      always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;
        add_header X-XSS-Protection           "1; mode=block"                                always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com; img-src 'self' data: https:; media-src 'self' https:;" always;
    }
}
